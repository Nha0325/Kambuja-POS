# CI validates pull requests and pushes to main.
# It installs both Node.js apps, checks Backend JavaScript syntax,
# lints the Frontend, and builds the Frontend production bundle.
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Backend and Frontend checks
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub Actions runner.
      - name: Checkout repository
        uses: actions/checkout@v5

      # Use the same Node.js major version requested for this project.
      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Backend/package-lock.json
            Frontend/package-lock.json

      # npm ci uses package-lock.json and fails if dependencies are inconsistent.
      - name: Install Backend dependencies
        working-directory: Backend
        run: npm ci --no-audit --no-fund

      # This repository's Backend test script checks JavaScript syntax with node --check.
      - name: Check Backend JavaScript syntax
        working-directory: Backend
        run: npm test

      # Install the React/Vite app dependencies before linting or building.
      - name: Install Frontend dependencies
        working-directory: Frontend
        run: npm ci --no-audit --no-fund

      # ESLint fails the workflow when lint errors are found.
      - name: Run Frontend lint
        working-directory: Frontend
        run: npm run lint

      # Build the production Frontend bundle and fail if Vite cannot build.
      - name: Build Frontend production
        working-directory: Frontend
        run: npm run build
