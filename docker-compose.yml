version: '3.8'

services:
  frontend:
    build:
      context: ./Frontend
    restart: always
    # Frontend exposes 80 internally (within Docker network)

  backend:
    build:
      context: ./Backend
    env_file:
      - .env
    environment:
      - PORT=8080
      # Using Docker MongoDB instance
      - MONGO_URI=mongodb://mongo:27017/kambuja_pos
    restart: always
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "8888:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  mongo_data:
