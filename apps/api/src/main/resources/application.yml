server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${APP_NAME:kambuja-pos-api}

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/kambuja_pos}
      auto-index-creation: true

jwt:
  secret: ${JWT_SECRET}
  issuer: ${JWT_ISSUER:kambuja-pos-api}
  access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:60}

app:
  bootstrap:
    admin-manager:
      name: ${BOOTSTRAP_ADMIN_MANAGER_NAME:Platform Manager}
      email: ${BOOTSTRAP_ADMIN_MANAGER_EMAIL:manager@kambujaflow.local}
      password: ${BOOTSTRAP_ADMIN_MANAGER_PASSWORD:change-me-before-production}

cors:
  enabled: ${CORS_ENABLED:true}
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PATCH,PUT,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Requested-With,X-Request-Id}
  exposed-headers: ${CORS_EXPOSED_HEADERS:X-Request-Id}
  max-age-seconds: ${CORS_MAX_AGE_SECONDS:1800}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}

waf:
  enabled: ${WAF_ENABLED:true}
  audit-only: ${WAF_AUDIT_ONLY:false}
  protected-path-prefixes: ${WAF_PROTECTED_PATH_PREFIXES:/api}
  allowed-methods: ${WAF_ALLOWED_METHODS:GET,POST,PATCH,PUT,DELETE,OPTIONS}
  max-uri-length: ${WAF_MAX_URI_LENGTH:2048}
  max-query-length: ${WAF_MAX_QUERY_LENGTH:2048}
  max-body-bytes: ${WAF_MAX_BODY_BYTES:65536}
  max-header-value-length: ${WAF_MAX_HEADER_VALUE_LENGTH:4096}
  max-header-count: ${WAF_MAX_HEADER_COUNT:80}
  max-requests-per-minute: ${WAF_MAX_REQUESTS_PER_MINUTE:120}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
