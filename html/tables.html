<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Manage Tables – FTC POS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .nav-gradient {
      background: linear-gradient(90deg, #5b00e5 0%, #007bff 100%);
    }
    @media print {
      .no-print { display: none !important; }
      body { background: #fff !important; }
      .card { border: none !important; box-shadow: none !important; }
    }
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg nav-gradient navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="index.html">FTC POS</a>
    <span class="text-white small flex-grow-1 ms-3">Manage Tables</span>
    <div class="d-flex align-items-center">
      <button class="btn btn-outline-light btn-sm me-2 no-print" onclick="window.print()">🖨️ Print</button>
      <span class="text-white me-3">admin (admin)</span>
      <a href="login.html" class="btn btn-outline-light btn-sm">
        <i class="bi bi-box-arrow-right"></i> Sign Out
      </a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Tables</h2>
    <button class="btn btn-primary no-print" data-bs-toggle="modal" data-bs-target="#addTableModal">
      <i class="bi bi-plus-circle"></i> Add New Table
    </button>
  </div>

  <!-- Ground Floor -->
  <div class="card mb-4">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Ground Floor</h5>
      <button class="btn btn-sm btn-light no-print">Edit Floor</button>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Table No</th>
              <th>Capacity</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>T01</td>
              <td>4</td>
              <td><span class="badge bg-success">Active</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
            <tr>
              <td>T02</td>
              <td>4</td>
              <td><span class="badge bg-success">Active</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
            <tr>
              <td>T03</td>
              <td>6</td>
              <td><span class="badge bg-success">Active</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Floor 01 -->
  <div class="card mb-4">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
      <h5 class="mb-0">Floor 01</h5>
      <button class="btn btn-sm btn-light">Edit Floor</button>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Table No</th>
              <th>Capacity</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>T11</td>
              <td>4</td>
              <td><span class="badge bg-success">Active</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
            <tr>
              <td>T12</td>
              <td>4</td>
              <td><span class="badge bg-success">Active</span></td>
              <td>
                <button class="btn btn-sm btn-outline-primary">Edit</button>
                <button class="btn btn-sm btn-outline-danger">Delete</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="mt-3 no-print">
    <a href="index.html" class="btn btn-secondary">
      <i class="bi bi-arrow-left"></i> Back to Tables
    </a>
  </div>
</div>

<!-- Add Table Modal -->
<div class="modal fade" id="addTableModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add New Table</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form>
          <div class="mb-3">
            <label class="form-label">Floor</label>
            <select class="form-select">
              <option>Ground Floor</option>
              <option>Floor 01</option>
              <option>Take Away</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Table Number</label>
            <input type="text" class="form-control" placeholder="e.g., T07">
          </div>
          <div class="mb-3">
            <label class="form-label">Capacity</label>
            <input type="number" class="form-control" value="4">
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary">Add Table</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
