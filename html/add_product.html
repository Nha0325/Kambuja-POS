<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Add Product – FTC POS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  .nav-gradient {
    background: linear-gradient(90deg, #5b00e5 0%, #007bff 100%);
  }
  .preview-img {
    max-width: 200px;
    max-height: 200px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 10px;
  }
</style>
</head>

<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark nav-gradient">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="index.html">FTC POS</a>
    <div class="ms-auto">
      <a class="btn btn-outline-light btn-sm" href="products.html">Back to Products</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h4 class="mb-0">ដាក់បន្ថែមទំនិញថ្មី / Add New Product</h4>
        </div>
        <div class="card-body">
          <form id="productForm">
            <div class="row g-3">
              
              <!-- Product Name -->
              <div class="col-md-12">
                <label class="form-label fw-semibold">ឈ្មោះទំនិញ / Product Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" required placeholder="e.g., Angkor Beer">
              </div>

              <!-- Category -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">ក្រុម / Category <span class="text-danger">*</span></label>
                <select class="form-select" name="category" required>
                  <option value="">-- Select Category --</option>
                  <option value="1">ភេសជ្ជៈ</option>
                  <option value="2">ផ្នែកស៊ុប</option>
                  <option value="3">ផ្នែកសាច់អាំង</option>
                  <option value="4">មុខម្ហូប ប្រភេទបុកល្ហុង និង ប្រភេទអាំង</option>
                </select>
              </div>

              <!-- Stock Quantity -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">ចំនួនស្តុក / Stock Quantity</label>
                <input type="number" class="form-control" name="stock" value="0" min="0">
              </div>

              <!-- Price USD -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">តម្លៃដុល្លារ / Price USD <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text">$</span>
                  <input type="number" class="form-control" name="price_usd" step="0.01" min="0" required placeholder="0.00" id="priceUSD">
                </div>
              </div>

              <!-- Price KHR -->
              <div class="col-md-6">
                <label class="form-label fw-semibold">តម្លៃរៀល / Price KHR <span class="text-danger">*</span></label>
                <div class="input-group">
                  <span class="input-group-text">៛</span>
                  <input type="number" class="form-control" name="price_khr" step="1" min="0" required placeholder="0" id="priceKHR">
                </div>
                <small class="text-muted">Rate: 1 USD = 4100 KHR</small>
              </div>

              <!-- Image Upload -->
              <div class="col-md-12">
                <label class="form-label fw-semibold">រូបភាព / Product Image</label>
                <input type="file" class="form-control" name="image" accept="image/*" id="imageInput">
                <img id="imagePreview" class="preview-img d-none" alt="Preview">
              </div>

              <!-- Active Status -->
              <div class="col-md-12">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" name="is_active" checked id="isActive">
                  <label class="form-check-label" for="isActive">
                    ដំណើរការ / Active (Show in menu)
                  </label>
                </div>
              </div>

              <!-- Buttons -->
              <div class="col-12">
                <hr>
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-check-circle"></i> រក្សាទុក / Save Product
                </button>
                <a href="products.html" class="btn btn-outline-secondary btn-lg ms-2">
                  <i class="bi bi-x-circle"></i> បោះបង់ / Cancel
                </a>
              </div>

            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const RATE = 4100;

// Auto-calculate KHR from USD
document.getElementById('priceUSD').addEventListener('input', function() {
  const usd = parseFloat(this.value) || 0;
  const khr = Math.round(usd * RATE);
  document.getElementById('priceKHR').value = khr;
});

// Auto-calculate USD from KHR
document.getElementById('priceKHR').addEventListener('input', function() {
  const khr = parseFloat(this.value) || 0;
  const usd = (khr / RATE).toFixed(2);
  document.getElementById('priceUSD').value = usd;
});

// Image preview
document.getElementById('imageInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('imagePreview');
      preview.src = e.target.result;
      preview.classList.remove('d-none');
    };
    reader.readAsDataURL(file);
  }
});

// Form submit
document.getElementById('productForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Product saved successfully! (Demo mode)');
  window.location.href = 'products.html';
});
</script>
</body>
</html>
